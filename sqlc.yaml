version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "internal/feature/auth/sqlc/queries.sql"
    gen:
      go:
        package: "authsqlc"
        out: "internal/feature/auth/sqlc"
        sql_package: "database/sql"
        emit_json_tags: false
        emit_db_tags: false
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: false
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "internal/feature/symbollist/sqlc/queries.sql"
    gen:
      go:
        package: "symbollistsqlc"
        out: "internal/feature/symbollist/sqlc"
        sql_package: "database/sql"
        emit_json_tags: false
        emit_db_tags: false
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: false
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "internal/feature/candles/sqlc/queries.sql"
    gen:
      go:
        package: "candlessqlc"
        out: "internal/feature/candles/sqlc"
        sql_package: "database/sql"
        emit_json_tags: false
        emit_db_tags: false
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: false
        overrides:
          # NUMERIC(15,4) は OHLC 値で使用しており、ドメイン側は float64 で扱うため float64 にマッピング。
          - db_type: "pg_catalog.numeric"
            go_type: "float64"
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "internal/feature/watchlist/sqlc/queries.sql"
    gen:
      go:
        package: "watchlistsqlc"
        out: "internal/feature/watchlist/sqlc"
        sql_package: "database/sql"
        emit_json_tags: false
        emit_db_tags: false
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: false
