version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "internal/feature/auth/adapters/sqlc/queries.sql"
    gen:
      go:
        package: "authsqlc"
        out: "internal/feature/auth/adapters/sqlc"
        sql_package: "database/sql"
        emit_json_tags: false
        emit_db_tags: false
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: false
