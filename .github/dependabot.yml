# Dependabot 設定。
# Go モジュールと GitHub Actions の依存を週次でチェックし、更新 PR を自動作成する。
# セキュリティアドバイザリ該当の更新はスケジュールに関係なく即時 PR が作成される。
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
