# ./docker/docker-compose.yml
# ローカル開発用 compose 定義（本番デプロイは GitHub Actions から Cloud Run に直接デプロイされる）
services:
  db:
    image: postgres:18
    container_name: stock-postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      TZ: Asia/Tokyo
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d app"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4
    container_name: stock-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api.dev
    container_name: stock-backend
    env_file:
      - ./.env.app
    environment:
      APP_ENV: docker-dev
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
      swagger-ui:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped
    # ローカルのソースをマウントして即時反映
    volumes:
      - ..:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - ${HOST_GOOGLE_ADC_PATH:-/dev/null}:${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:ro

  ingest:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api.dev
    env_file:
      - ./.env.app
    volumes:
      - ..:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command: ["go", "run", "./cmd/batch", "candles"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # マイグレーション専用バイナリ。本番では同 Dockerfile を Cloud Run Job 等にデプロイ。
  # backend 起動時に依存として自動実行される。
  # 個別実行: docker compose -f docker/docker-compose.yml -p stock run --rm migrate [up|status|down|...]
  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migrate
    env_file:
      - ./.env.app
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  # 初期データ投入（symbols の upsert）。migrate 完了後に seed.sql を流す。
  # seed.sql は冪等なので起動のたびに再実行されても既存データを消さない。
  seed:
    image: postgres:18
    container_name: stock-seed
    env_file:
      - ./.env.app
    volumes:
      - ./postgres/seed.sql:/seed.sql:ro
    command:
      - sh
      - -c
      - 'PGPASSWORD="$$DB_PASSWORD" psql -h "$$DB_HOST" -p "$$DB_PORT" -U "$$DB_USER" -d "$$DB_NAME" -v ON_ERROR_STOP=1 -f /seed.sql'
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: stock-swagger-ui
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /app/openapi.yaml
    volumes:
      - ../api/openapi.yaml:/app/openapi.yaml:ro
    restart: unless-stopped

  logo-ingest:
    build:
      context: ..
      dockerfile: docker/Dockerfile.batch
    image: stock-logo-ingest
    container_name: stock-logo-ingest
    env_file:
      - ./.env.app
    command: ["logo"]
    restart: "no"
    profiles: ["on-demand"]

  tbls:
    # CI の k1LoW/setup-tbls がインストールするバージョンと揃えること
    image: ghcr.io/k1low/tbls:v1.94.4
    container_name: stock-tbls
    profiles: ["on-demand"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      TBLS_DSN: postgres://appuser:apppass@db:5432/app?sslmode=disable
    working_dir: /work
    volumes:
      - ..:/work

volumes:
  postgres_data:
  redis_data:
  go-mod-cache:
  go-build-cache:
