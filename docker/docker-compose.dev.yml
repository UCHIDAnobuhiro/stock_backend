# docker/docker-compose.dev.yml
services:
  db:
    image: postgres:16
    container_name: stock-postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      TZ: Asia/Tokyo
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d app"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4
    container_name: stock-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server.dev
    container_name: stock-backend-dev
    env_file:
      - ../.env.docker
    environment:
      APP_ENV: docker-dev
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped
    # ローカルのソースをマウントして即時反映
    volumes:
      - ..:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - ${HOST_GOOGLE_ADC_PATH:-/dev/null}:${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:ro

  ingest:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server.dev
    env_file:
      - ../.env.docker
    volumes:
      - ..:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command: ["go", "run", "./cmd/ingest"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
        
  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: stock-swagger-ui
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /app/openapi.yaml
    volumes:
      - ../api/openapi.yaml:/app/openapi.yaml:ro
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  go-mod-cache:
  go-build-cache:
